databaseChangeLog:
  - changeSet:
      id: 0.0.1
      author: beo
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column: { name: username, type: nvarchar(100), constraints: { nullable: false, unique: true } }
              - column: { name: password, type: nvarchar(100), constraints: { nullable: false } }